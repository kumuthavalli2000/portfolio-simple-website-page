    <table>
      <tr>
        <td>Name:</td>
        <td><input type="text" placeholder="Enter your name" class="contact-form__input"/></td>
      </tr>
      <tr>
        <td>Email:</td>
        <td><input type="email" placeholder="Enter your email" class="contact-form__input" /></td>
      </tr>
      <tr>
        <td>Message:</td>
        <td><textarea name="" id="" placeholder="Your Message" class="contact-form__textarea"></textarea></td>
      </tr>
      <tr>
        <td></td>
        <td><button class="contact-form__submit">Submit</button></td>
      </tr>
    </table>
  </form>
  <div class="one">
    <p>
      Social media:
      <a href="https://www.instagram.com/accounts/emailsignup/?next=&hl=en"

      >

      &copy;Kumuthavalli
